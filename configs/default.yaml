# Default pipeline configuration.
# Everything here is overridable from the CLI (e.g. --top-k 8) and by the
# config sweep. Secrets are NOT stored here — API keys come from the environment.

embedding:
  provider: bge                       # bge | openai | voyage
  model: BAAI/bge-small-en-v1.5
  batch_size: 32

llm:
  provider: groq                      # groq | openai | anthropic
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 1024

# The judge can differ from the answerer to reduce self-preference bias.
judge:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 1024

chunking:
  chunk_size: 512
  chunk_overlap: 64

retrieval:
  top_k: 5

storage:
  persist_dir: .chroma
  collection: rag_eval

paths:
  corpus_dir: data/corpus
  eval_set: data/eval/eval_set.jsonl
  runs_dir: runs
