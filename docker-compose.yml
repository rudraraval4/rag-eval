# Run the rag-eval API locally: `docker compose up --build`
# Then: curl localhost:8000/health, POST /ingest, POST /ask.
services:
  rag-eval:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env            # must contain GROQ_API_KEY (see .env.example)
    volumes:
      - ./data:/app/data          # your corpus + eval set
      - chroma:/app/.chroma       # persist the vector index across restarts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  chroma:
